<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 520px;
    }

    .card + .card { margin-top: 16px; }

    .card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #38bdf8; }

    button.primary {
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: #0f172a;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 18px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.primary:hover { background: #7dd3fc; }

    #status {
      font-size: 0.82rem;
      margin-top: 8px;
      min-height: 18px;
      color: #94a3b8;
    }

    #status.error { color: #f87171; }
    #status.success { color: #4ade80; }

    #messages { list-style: none; }

    #messages li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      gap: 12px;
      transition: background 0.1s;
    }

    #messages li:hover { background: #0f172a; }

    .msg-text { flex: 1; font-size: 0.95rem; }

    .msg-time {
      font-size: 0.75rem;
      color: #475569;
      white-space: nowrap;
    }

    button.del {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
      line-height: 1;
    }

    button.del:hover { color: #f87171; }

    #empty {
      color: #475569;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Hello, World!</h1>
    <p>Node.js &middot; Express &middot; SQLite</p>
  </header>

  <div class="card">
    <h2>Leave a message</h2>
    <div class="input-row">
      <input type="text" id="input" placeholder="Type something..." maxlength="200" />
      <button class="primary" onclick="addMessage()">Save</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="card">
    <h2>Messages from the database</h2>
    <ul id="messages"><li id="empty">No messages yet.</li></ul>
  </div>

  <script>
    const statusEl = document.getElementById('status');

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = type;
    }

    function formatTime(iso) {
      return new Date(iso + 'Z').toLocaleString();
    }

    async function loadMessages() {
      const res = await fetch('/api/messages');
      const data = await res.json();
      const ul = document.getElementById('messages');
      ul.innerHTML = '';
      if (!data.length) {
        ul.innerHTML = '<li id="empty">No messages yet.</li>';
        return;
      }
      data.forEach(m => ul.appendChild(buildRow(m)));
    }

    function buildRow(m) {
      const li = document.createElement('li');
      li.id = `msg-${m.id}`;
      li.innerHTML = `
        <span class="msg-text">${escHtml(m.text)}</span>
        <span class="msg-time">${formatTime(m.created_at)}</span>
        <button class="del" title="Delete" onclick="deleteMessage(${m.id})">&#x2715;</button>
      `;
      return li;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function addMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) { setStatus('Please enter a message.', 'error'); return; }

      setStatus('Saving...');
      const res = await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });

      if (!res.ok) {
        setStatus('Failed to save.', 'error');
        return;
      }
      input.value = '';
      setStatus('Saved!', 'success');
      setTimeout(() => setStatus(''), 2000);
      await loadMessages();
    }

    async function deleteMessage(id) {
      await fetch(`/api/messages/${id}`, { method: 'DELETE' });
      document.getElementById(`msg-${id}`)?.remove();
      if (!document.querySelector('#messages li:not(#empty)')) {
        document.getElementById('messages').innerHTML = '<li id="empty">No messages yet.</li>';
      }
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addMessage();
    });

    loadMessages();
  </script>
</body>
</html>
